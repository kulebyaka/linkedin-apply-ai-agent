name: Release

# Fires on:
#   - a published GitHub Release (normal flow — tag becomes the image version)
#   - manual workflow_dispatch with an explicit tag input (for first-deploy
#     bootstrap and ad-hoc redeploys without cutting a Release)
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build and deploy (e.g. v0.1.0)"
        required: true
        default: "v0.0.0"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NS: ${{ github.repository_owner }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/linkedin-apply-ai-agent-api:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/linkedin-apply-ai-agent-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push UI (build-artifact image)
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ui/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_APP_VERSION=${{ steps.tag.outputs.value }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/linkedin-apply-ai-agent-ui:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/linkedin-apply-ai-agent-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render compose with version tag
        run: sed "s|__VERSION__|${{ steps.tag.outputs.value }}|g" docker-compose.prod.yml > compose.rendered.yml

      - name: Render Caddyfile with domain + email
        run: |
          sed -e "s|__DOMAIN__|${{ vars.APP_DOMAIN }}|g" \
              -e "s|__ACME_EMAIL__|${{ vars.ACME_EMAIL }}|g" \
              Caddyfile > Caddyfile.rendered

      - name: Copy compose + Caddyfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "compose.rendered.yml,Caddyfile.rendered"
          target: /opt/linkedin-apply/
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          KEEP_TAG: ${{ steps.tag.outputs.value }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NS: ${{ env.IMAGE_NS }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_PULL_TOKEN,GH_ACTOR,KEEP_TAG,REGISTRY,IMAGE_NS
          script: |
            set -e
            cd /opt/linkedin-apply
            mv compose.rendered.yml docker-compose.yml
            mv Caddyfile.rendered Caddyfile
            # Persistent GHCR auth lives in /root/.docker/config.json after the
            # first successful login. Refresh it best-effort; if the secret is
            # absent/invalid the deploy still continues against the cached creds.
            if [ -n "$GHCR_PULL_TOKEN" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin \
                || echo "GHCR login failed; relying on cached /root/.docker/config.json"
            fi
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose run --rm ui-publisher
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || true
            # Reclaim disk from prior releases. `docker image prune -f` only drops
            # dangling (untagged) layers — it leaves the previous version-tagged
            # image (e.g. api:v0.1.18, ~1.9GB) behind, which is what fills the disk
            # over time. Explicitly remove old version tags of OUR two images,
            # keeping the just-deployed tag and :latest. Scoped to our repo refs so
            # other projects' images on this shared box are never touched.
            for repo in api ui; do
              img="${REGISTRY}/${IMAGE_NS}/linkedin-apply-ai-agent-${repo}"
              docker images "$img" --format '{{.Tag}}' \
                | grep -vxE "${KEEP_TAG}|latest|<none>" \
                | while read -r t; do
                    echo "Removing stale image $img:$t"
                    docker rmi "$img:$t" || true
                  done
            done
            docker image prune -f
            docker compose ps
